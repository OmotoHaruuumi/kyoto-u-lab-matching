services:
  # ------------------------------------------------------------------
  # PostgreSQL with pgvector extension
  # ------------------------------------------------------------------
  db:
    image: pgvector/pgvector:pg16
    container_name: kyoto_lab_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-labmatch}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-labmatch_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-labmatch} -d ${POSTGRES_DB:-labmatch_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ------------------------------------------------------------------
  # Redis (session cache / task queue)
  # ------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: kyoto_lab_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - backend_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ------------------------------------------------------------------
  # DB Migration (alembic) — run with: docker compose --profile migrate up migrate
  # ------------------------------------------------------------------
  migrate:
    build:
      context: ./backend
      dockerfile: search_api/Dockerfile
    command: python3 -m alembic -c /app/db/alembic.ini upgrade head
    env_file:
      - .env
    volumes:
      - ./db:/app/db
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend_net
    profiles:
      - migrate

  # ------------------------------------------------------------------
  # Embedding API (FastAPI)
  # ------------------------------------------------------------------
  embedding_api:
    build:
      context: ./backend
      dockerfile: embedding_api/Dockerfile
    container_name: kyoto_embedding_api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8001:8001"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend_net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ------------------------------------------------------------------
  # Search API (FastAPI)
  # ------------------------------------------------------------------
  search_api:
    build:
      context: ./backend
      dockerfile: search_api/Dockerfile
    container_name: kyoto_search_api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      embedding_api:
        condition: service_healthy
    networks:
      - backend_net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ------------------------------------------------------------------
  # Frontend (Next.js)
  # ------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kyoto_frontend
    restart: unless-stopped
    environment:
      SEARCH_API_URL: ${SEARCH_API_URL:-http://search_api:8000}
    ports:
      - "3000:3000"
    depends_on:
      search_api:
        condition: service_healthy
    networks:
      - backend_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ------------------------------------------------------------------
  # Crawler (Playwright + Gemini) — run with: docker compose --profile crawler up
  # ------------------------------------------------------------------
  crawler:
    build:
      context: .
      dockerfile: crawler/Dockerfile
    container_name: kyoto_crawler
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      embedding_api:
        condition: service_healthy
    volumes:
      - ./crawler/urls.csv:/app/crawler/urls.csv
      - ./crawler/index_urls.txt:/app/crawler/index_urls.txt
      - ./crawler/categories.json:/app/crawler/categories.json
      - ./crawler/normalize_categories.py:/app/crawler/normalize_categories.py
    networks:
      - backend_net
    profiles:
      - crawler

# ------------------------------------------------------------------
# Volumes
# ------------------------------------------------------------------
volumes:
  postgres_data:
  redis_data:

# ------------------------------------------------------------------
# Networks
# ------------------------------------------------------------------
networks:
  backend_net:
    driver: bridge
